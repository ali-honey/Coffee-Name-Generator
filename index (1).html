<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coffee Name Generator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: #2c1a0e;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .card {
    background: #fffaf5;
    border-radius: 12px;
    padding: 48px 40px;
    max-width: 420px;
    width: 100%;
    text-align: center;
  }

  h1 {
    font-size: 22px;
    color: #2c1a0e;
    margin-bottom: 32px;
    font-weight: 600;
  }

  input {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid #c8a882;
    border-radius: 8px;
    font-size: 15px;
    color: #2c1a0e;
    background: #fff;
    outline: none;
    margin-bottom: 14px;
    display: block;
  }

  input:focus { border-color: #7b4f2e; }
  input::placeholder { color: #b0956e; }

  button {
    width: 100%;
    padding: 13px;
    background: #7b4f2e;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 6px;
  }

  button:hover { background: #5e3a20; }

  .result {
    display: none;
    margin-top: 30px;
    padding: 24px;
    background: #2c1a0e;
    border-radius: 10px;
    color: #fffaf5;
  }

  .result p { font-size: 14px; color: #c8a882; margin-bottom: 8px; }
  .result h2 { font-size: 26px; font-weight: 700; }

  .again {
    background: none;
    border: 1.5px solid #c8a882;
    color: #7b4f2e;
    margin-top: 20px;
    font-size: 14px;
    padding: 10px;
  }

  .again:hover { background: #f5e6d4; }
</style>
</head>
<body>

<div class="card">
  <h1>Welcome to the Coffee Name Generator</h1>

  <div id="form">
    <input type="text" id="city" placeholder="Which city did you grow up in?" />
    <input type="text" id="pet" placeholder="What is your favourite pet name?" />
    <button onclick="generate()">Run</button>
  </div>

  <div class="result" id="result">
    <p>Your coffee name could be</p>
    <h2 id="output"></h2>
    <button class="again" onclick="reset()">Try again</button>
  </div>
</div>

<script>
  function generate() {
    const city = document.getElementById('city').value.trim();
    const pet = document.getElementById('pet').value.trim();
    if (!city || !pet) return;
    document.getElementById('output').textContent = city + ' ' + pet;
    document.getElementById('form').style.display = 'none';
    document.getElementById('result').style.display = 'block';
  }

  function reset() {
    document.getElementById('city').value = '';
    document.getElementById('pet').value = '';
    document.getElementById('form').style.display = 'block';
    document.getElementById('result').style.display = 'none';
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') generate(); });
</script>

</body>
</html>
