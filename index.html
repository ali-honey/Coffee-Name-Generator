<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coffee Name Generator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: #1a0a00;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .card {
    background: #fff8f0;
    border-radius: 16px;
    padding: 40px 36px;
    max-width: 480px;
    width: 100%;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .emoji { font-size: 52px; margin-bottom: 12px; }

  h1 {
    font-size: 26px;
    color: #3b1a00;
    margin-bottom: 6px;
    font-weight: 700;
  }

  .subtitle {
    font-size: 14px;
    color: #7a5c3a;
    margin-bottom: 32px;
  }

  .badge {
    display: inline-block;
    background: #3b1a00;
    color: #fff8f0;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 28px;
    text-transform: uppercase;
  }

  label {
    display: block;
    text-align: left;
    font-size: 13px;
    font-weight: 600;
    color: #5a3a1a;
    margin-bottom: 6px;
    margin-top: 18px;
  }

  input {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid #d4a96a;
    border-radius: 10px;
    font-size: 15px;
    color: #3b1a00;
    background: #fff;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus { border-color: #8b4513; }

  button {
    width: 100%;
    margin-top: 28px;
    padding: 14px;
    background: #8b4513;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }

  button:hover { background: #6b3410; }
  button:active { transform: scale(0.98); }

  .result {
    display: none;
    margin-top: 28px;
    background: #3b1a00;
    border-radius: 12px;
    padding: 24px 20px;
  }

  .result-label {
    font-size: 12px;
    color: #d4a96a;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }

  .result-name {
    font-size: 28px;
    font-weight: 700;
    color: #fff8f0;
    word-break: break-word;
  }

  .result-sub {
    font-size: 13px;
    color: #a07850;
    margin-top: 8px;
  }

  .reset {
    background: none;
    border: 1.5px solid #d4a96a;
    color: #7a5c3a;
    margin-top: 14px;
    font-size: 14px;
    padding: 10px;
  }

  .reset:hover { background: #f5e6d0; }

  .day-tag {
    font-size: 12px;
    color: #a07850;
    margin-top: 28px;
  }

  .error {
    display: none;
    margin-top: 12px;
    color: #c0392b;
    font-size: 13px;
  }
</style>
</head>
<body>

<div class="card">
  <div class="emoji">☕</div>
  <div class="badge">Angela Yu — Day 1 Project</div>
  <h1>Coffee Name Generator</h1>
  <p class="subtitle">Discover your unique coffee name in seconds</p>

  <div id="form-section">
    <label for="city">Which city did you grow up in?</label>
    <input type="text" id="city" placeholder="e.g. Dublin" maxlength="40" />

    <label for="pet">What is your favourite pet name?</label>
    <input type="text" id="pet" placeholder="e.g. Biscuit" maxlength="40" />

    <p class="error" id="error-msg">Please fill in both fields to continue.</p>

    <button onclick="generate()">Generate My Coffee Name</button>
  </div>

  <div class="result" id="result-section">
    <div class="result-label">Your coffee name is</div>
    <div class="result-name" id="coffee-name"></div>
    <div class="result-sub">Served hot, just like you ☕</div>
    <button class="reset" onclick="reset()">Try Again</button>
  </div>

  <p class="day-tag">Built by ali-honey &nbsp;·&nbsp; 100 Days of Code &nbsp;·&nbsp; Python Day 1</p>
</div>

<script>
  function generate() {
    const city = document.getElementById('city').value.trim();
    const pet = document.getElementById('pet').value.trim();
    const error = document.getElementById('error-msg');

    if (!city || !pet) {
      error.style.display = 'block';
      return;
    }

    error.style.display = 'none';
    const name = city + ' ' + pet;
    document.getElementById('coffee-name').textContent = name;
    document.getElementById('form-section').style.display = 'none';
    document.getElementById('result-section').style.display = 'block';
  }

  function reset() {
    document.getElementById('city').value = '';
    document.getElementById('pet').value = '';
    document.getElementById('form-section').style.display = 'block';
    document.getElementById('result-section').style.display = 'none';
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') generate();
  });
</script>

</body>
</html>
